<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Burnout Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            font-weight: 600;
        }
        
        .button:hover {
            transform: translateY(-2px);
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result.low {
            background: #d4edda;
            border-left: 4px solid #28a745;
        }
        
        .result.medium {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
        }
        
        .result.high {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
        }
        
        .result-label {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-details {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        
        .progress {
            margin-top: 15px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .file-info {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9ff;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            display: none;
        }
        
        .file-info.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Employee Burnout Predictor</h1>
        <p class="subtitle">Upload a speech sample to analyze burnout risk using AI-powered voice analysis</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🎵</div>
            <p><strong>Click to upload</strong> or drag and drop</p>
            <p style="font-size: 12px; color: #999; margin-top: 5px;">WAV, MP3, or other audio formats</p>
            <input type="file" id="fileInput" accept="audio/*">
        </div>
        
        <div class="file-info" id="fileInfo"></div>
        
        <audio id="audioPlayer" controls ></audio>
        <button class="button" id="analyzeBtn" disabled>Analyze Speech</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing speech patterns...</p>
        </div>
        
        <div class="result" id="result">
            <div class="result-label" id="resultLabel"></div>
            <div class="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="result-details" id="resultDetails"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
